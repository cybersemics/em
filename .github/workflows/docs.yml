name: Docs

# Temporarily disable the workflow except when manually triggered
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_dispatch
on: workflow_dispatch

# on:
#   push:
#     branches:
#       - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COPILOT_AGENT_FIREWALL_ALLOW_LIST_ADDITIONS: googlechromelabs.github.io,storage.googleapis.com
  # Skip Puppeteer's Chrome download on install — no CI job uses the bundled browser (Puppeteer
  # tests attach to the browserless/chrome service via CDP), saving ~20s per install.
  PUPPETEER_SKIP_DOWNLOAD: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          # For GitHub Pages deployment, persist-credentials: false is often required.
          persist-credentials: false

      - name: Install npm dependencies 🛠
        uses: ./.github/actions/install

      - name: Build 🔧
        run: yarn docs

      - name: NoJekyll 🎃
        run: touch docs/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: docs
