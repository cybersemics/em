name: Vercel Preview

# pull_request_target runs in the base repo's context, so repo secrets are
# available even for fork PRs. Untrusted fork code is gated by GitHub's
# "require approval for outside collaborators" setting before it runs.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Skip Puppeteer's Chrome download on install — the Vercel build never uses the bundled
  # browser, saving ~20s per install.
  PUPPETEER_SKIP_DOWNLOAD: true

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.changed_files > 0

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Set Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install npm dependencies
        uses: ./.github/actions/install

      - name: Pull Vercel environment
        run: yarn dlx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build
        run: yarn dlx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy
        id: deploy
        run: |
          url="$(yarn dlx vercel deploy --prebuilt --token="$VERCEL_TOKEN" | grep -Eo 'https://[^[:space:]]+' | tail -n 1)"
          test -n "$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const marker = '<!-- vercel-preview -->'
            const body = `${marker}\n<sub><img src="https://avatars.githubusercontent.com/in/8329?s=20&v=4" width="14" /></sub> Vercel preview: ${url}`
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
