name: Tauri Release (main)

# Publishes a rolling development build of the em desktop app on every push to main.
# All artifacts are attached to a single, continuously-updated prerelease (tag
# `pre`), so releases do not accumulate — each push overwrites the assets.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only keep the newest build for the rolling channel. Superseded in-progress builds
# are cancelled so we don't waste CI minutes or upload stale binaries.
concurrency:
  group: tauri-release-main
  cancel-in-progress: true

# tauri-action needs write access to create/update the GitHub Release.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  build:
    name: Build (${{ matrix.platform }} ${{ matrix.args }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M1+)
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel (cross-compiled)
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only needed on macOS, where we build both architectures.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: yarn

      - name: Build and publish desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: pre
          releaseName: em (prerelease)
          releaseBody: |
            Automated prerelease build from the latest commit on `main`.

            Commit: ${{ github.sha }}
            Run: ${{ github.run_number }}

            > ⚠️ These builds are **unsigned** and may trigger Gatekeeper (macOS) or SmartScreen (Windows) warnings.
          prerelease: true
          releaseDraft: false
          args: ${{ matrix.args }}
