name: Estimate issue on open
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  estimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: yarn install --frozen-lockfile
      - name: Estimate issue
        run: npx tsx scripts/estimate-issue.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVERHOUR_API_KEY: ${{ secrets.EVERHOUR_API_KEY }}
