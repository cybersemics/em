name: Puppeteer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      rerun_id:
        description: 'Optional ID for tracking repeated runs'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true
  COPILOT_AGENT_FIREWALL_ALLOW_LIST_ADDITIONS: googlechromelabs.github.io,storage.googleapis.com
  # Skip Puppeteer's Chrome download on install — no CI job uses the bundled browser (Puppeteer
  # tests attach to the browserless/chrome service via CDP), saving ~20s per install.
  PUPPETEER_SKIP_DOWNLOAD: true

jobs:
  run:
    name: Puppeteer
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.changed_files > 0
    services:
      browserless:
        image: browserless/chrome:latest
        ports:
          - 7566:3000
        env:
          CONNECTION_TIMEOUT: -1

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install npm dependencies
        uses: ./.github/actions/install

      - name: Build
        run: yarn build

      - name: Serve
        uses: ./.github/actions/serve

      - name: Test
        run: yarn test:puppeteer

      - name: Upload snapshot diff artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: __diff_output__
          path: src/e2e/puppeteer/__tests__/__image_snapshots__/**/__diff_output__/
          if-no-files-found: ignore

      # Carry the PR number to the privileged workflow_run job. github.event.workflow_run.pull_requests
      # is empty for fork PRs, so the number must be passed via an artifact. Uploaded on every PR run
      # (success or failure) so the comment can be posted on failure and pruned/resolved on success.
      - name: Save PR number
        if: always() && github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload PR number artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr-number.txt
          if-no-files-found: ignore
