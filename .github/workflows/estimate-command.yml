name: Handle estimate command
on:
  issue_comment:
    types: [created]

permissions:
  contents: write # To create a branch and commit the new estimation sample file into .github/instructions/estimate/
  pull-requests: write # To open the pull request that adds the sample
  issues: write # To post back on the issue/comment thread — e.g., react to or reply to the /estimate Nh comment

jobs:
  estimate-command:
    if: startsWith(github.event.comment.body, '/estimate ')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: yarn install --frozen-lockfile
      - name: Handle estimate command
        run: node --experimental-strip-types scripts/estimate/src/command.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVERHOUR_API_KEY: ${{ secrets.EVERHOUR_API_KEY }}
