name: BrowserStack

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      rerun_id:
        description: 'Optional ID for tracking repeated runs'
        required: false

# Serialize BrowserStack runs repo-wide. Every run draws from the same shared parallel-session pool, so
# overlapping runs (a main push + PR syncs + reruns) can over-subscribe it and fail with session-creation
# timeouts. Allowing one active run at a time keeps total live sessions within maxInstances.
# cancel-in-progress: false queues runs instead of cancelling them, so no run is dropped.
# queue: max extends the queue from the default 1 to the maximum of 100, ensuring runs don't get silently
# dropped if lots of jobs queue up.
concurrency:
  group: browserstack
  cancel-in-progress: false
  queue: max

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true
  COPILOT_AGENT_FIREWALL_ALLOW_LIST_ADDITIONS: googlechromelabs.github.io,storage.googleapis.com
  # Activates the console proxy (src/util/consoleProxy.ts), which we need because BrowserStack
  # can't access iOS console logs.
  VITE_BROWSER_CONSOLE_CAPTURE: 1

jobs:
  # Cheap gate that decides whether the expensive BrowserStack job should run.
  # It outputs run=true unless a PR touches nothing but .github/instructions/**.
  # Keeping the trigger unchanged (rather than using paths-ignore) is required because
  # BrowserStack is a required status check: a workflow that never runs would leave the check
  # unreported and block the PR. A job skipped via `if` still reports its required check as
  # passing, so instructions-only PRs stay mergeable.
  #
  # The plain checkout (used only so paths-filter can diff push events) resolves to the base
  # repo commit under pull_request_target, not the PR's fork head, so no untrusted code runs in
  # this privileged context. The token is scoped to pull-requests: read.
  changes:
    name: Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # run is true when at least one changed file is outside .github/instructions/.
          filters: |
            run:
              - '!.github/instructions/**'

  run:
    name: BrowserStack
    runs-on: ubuntu-latest
    needs: changes
    # Only pull requests are gated on the changed-file filter; pushes to main and manual
    # workflow_dispatch runs always execute.
    if: github.event_name != 'pull_request_target' || needs.changes.outputs.run == 'true'

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}

      # `pull_request_target` runs the workflow file from the default branch but checks out the PR's
      # head code. PRs that branched before the HTTPS dev server migration use an HTTP-only dev
      # server with no token gate; PRs at or after it use HTTPS + a tunnel-token gate. Detect which
      # mode the checked-out code is in so the health check probes the right protocol and we only
      # generate a tunnel token when one is needed.
      - name: Detect dev server mode
        id: server_mode
        run: |
          if grep -q "@vitejs/plugin-basic-ssl" vite.config.ts; then
            echo "https=true" >> "$GITHUB_OUTPUT"
            echo "Mode: HTTPS"
          else
            echo "https=false" >> "$GITHUB_OUTPUT"
            echo "Mode: HTTP (PR predates HTTPS dev server migration)"
          fi

      - name: Enable Corepack
        run: corepack enable

      - name: Set Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install npm dependencies
        run: yarn

      - name: Build
        run: yarn build

      - name: Generate tunnel token
        if: steps.server_mode.outputs.https == 'true'
        run: |
          TOKEN=$(openssl rand -hex 16)
          echo "::add-mask::$TOKEN"
          echo "TUNNEL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Serve
        env:
          USE_HTTPS: ${{ steps.server_mode.outputs.https }}
        run: |
          yarn servebuild &

          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if [ "$USE_HTTPS" = "true" ]; then
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -k "https://localhost:3000?__token=$TUNNEL_TOKEN" 2>/dev/null || echo "000")
            else
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000" 2>/dev/null || echo "000")
            fi
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i/30: status $HTTP_STATUS"
            if [ $i -eq 30 ]; then
              echo "Server failed to respond after 30 attempts"
              exit 1
            fi
            sleep 1
          done

      - name: Test iOS on BrowserStack
        run: yarn test:ios
        env:
          BROWSERSTACK_USERNAME: ${{secrets.BROWSERSTACK_USERNAME}}
          BROWSERSTACK_ACCESS_KEY: ${{secrets.BROWSERSTACK_ACCESS_KEY}}
          BROWSERSTACK_BUILD_NAME: 'CI - ${{github.run_id}}'
          BROWSERSTACK_PROJECT_NAME: 'em'
          TUNNEL_TOKEN: ${{env.TUNNEL_TOKEN}}
