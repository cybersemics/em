name: BrowserStack

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      rerun_id:
        description: 'Optional ID for tracking repeated runs'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true
  COPILOT_AGENT_FIREWALL_ALLOW_LIST_ADDITIONS: googlechromelabs.github.io,storage.googleapis.com

jobs:
  run:
    name: BrowserStack
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}

      - name: Enable Corepack
        run: corepack enable

      - name: Set Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        run: yarn

      - name: Build
        run: yarn build

      - name: Serve
        run: |
          yarn servebuild &

          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -k https://localhost:3000 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i/30: status $HTTP_STATUS"
            if [ $i -eq 30 ]; then
              echo "Server failed to respond after 30 attempts"
              exit 1
            fi
            sleep 1
          done

      - name: Start cloudflared tunnel
        run: |
          # Install cloudflared
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

          # Start tunnel and capture the public URL
          cloudflared tunnel --url https://localhost:3000 --no-tls-verify > /tmp/cloudflared.log 2>&1 &
          echo "Waiting for cloudflared tunnel..."
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "Tunnel URL: $TUNNEL_URL"
              echo "CLOUDFLARED_URL=$TUNNEL_URL" >> $GITHUB_ENV
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Failed to get cloudflared tunnel URL"
              cat /tmp/cloudflared.log
              exit 1
            fi
            sleep 1
          done

      - name: Test iOS on BrowserStack
        run: yarn test:ios
        env:
          BROWSERSTACK_USERNAME: ${{secrets.BROWSERSTACK_USERNAME}}
          BROWSERSTACK_ACCESS_KEY: ${{secrets.BROWSERSTACK_ACCESS_KEY}}
          BROWSERSTACK_BUILD_NAME: 'CI - ${{github.run_id}}'
          BROWSERSTACK_PROJECT_NAME: 'em'
