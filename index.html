<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- maximum-scale=1 to avoid editable autozoom on safari
      See: https://stackoverflow.com/questions/2989263/disable-auto-zoom-in-input-text-tag-safari-on-iphone
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#333333" />
    <link href="/fonts/lora.css" rel="stylesheet" />
    <link
      rel="preload"
      href="/fonts/RadioCanadaBig/RadioCanadaBig-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/RadioCanadaBig/RadioCanadaBig-Medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/RadioCanadaBig/RadioCanadaBig-SemiBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/RadioCanadaBig/RadioCanadaBig-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link href="/fonts/RadioCanadaBig/radio-canada-big.css" rel="stylesheet" />
    <!-- Web manifest is injected via vite-plugin-pwa. See: vite.config.ts-->
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="theme-color" content="#000" />
    <title>em</title>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Prevent the React DevTools advertisement in Puppeteer tests and development mode.
      // https://github.com/cybersemics/em/issues/2251
      if (navigator.webdriver || '%MODE%' === 'development') {
        const info = console.info.bind(console)
        console.info = (...args) => {
          if (typeof args[0] === 'string' && args[0].startsWith('%cDownload the React DevTools')) return
          info(...args)
        }
      }

      // Load theme synchronously before React loads, otherwise it causes a white flash.
      const theme = localStorage.getItem('storageCache/theme')?.toLowerCase() || 'dark'
      document.documentElement.style.backgroundColor = theme === 'dark' ? '#000' : '#fff'
      document.body.setAttribute('data-color-mode', theme)
      document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#000' : '#fff')
      document.body.setAttribute('data-env', navigator.webdriver ? 'test' : '%MODE%')

      // Proactively load Radio Canada Big at startup so it is ready before the gesture menu opens.
      // Preload only warms the HTTP cache; it does not load the @font-face. Without this the font
      // loads lazily on first menu render, triggering font-display's block/swap window (font blip).
      // Run on window load so the @font-face rules are registered; calling load() earlier matches
      // zero faces (the stylesheet has not been parsed yet) and silently does nothing.
      if (document.fonts && document.fonts.load) {
        window.addEventListener('load', () =>
          ['400', '500', '600', '700'].forEach(weight => document.fonts.load(weight + ' 1em "Radio Canada Big"')),
        )
      }
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
